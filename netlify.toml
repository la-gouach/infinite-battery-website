# Netlify configuration
# Static site — no build step needed. Netlify serves the repo root as-is.

[build]
  publish = "."
  command = ""

# Optional: nice security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
